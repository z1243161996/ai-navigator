name: Release Extension

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd extension && zip -r ../ai-navigator-extension-${{ github.ref_name }}.zip .
      - uses: softprops/action-gh-release@v2
        with:
          files: ai-navigator-extension-${{ github.ref_name }}.zip
